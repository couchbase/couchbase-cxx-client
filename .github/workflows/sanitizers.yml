name: sanitizers
permissions: {}

on:
  push:
    branches:
      - main
      - release-*
  pull_request:
    branches:
      - main
      - release-*

env:
  LLVM_VERSION: 20

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        sanitizer:
          - asan
          - lsan
          - tsan
          - ubsan
          - valgrind
    runs-on: ubuntu-24.04
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y libssl-dev cmake curl wget gnupg2 libcurl4-openssl-dev libprotobuf-dev libgrpc-dev libgrpc++-dev protobuf-compiler-grpc gdb valgrind
          wget -O - https://apt.llvm.org/llvm-snapshot.gpg.key | sudo gpg --dearmor --output /etc/apt/keyrings/llvm-snapshot.gpg
          sudo bash -c "echo 'deb [signed-by=/etc/apt/keyrings/llvm-snapshot.gpg] https://apt.llvm.org/noble/ llvm-toolchain-noble-${LLVM_VERSION} main' >> /etc/apt/sources.list"
          sudo apt-get update -y
          sudo apt-get install -y clang-${LLVM_VERSION} clang-tools-${LLVM_VERSION} libc++-${LLVM_VERSION}-dev libc++abi-${LLVM_VERSION}-dev libclang-rt-${LLVM_VERSION}-dev
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ github.job }}
      - name: Build tests (${{ matrix.sanitizer }})
        env:
          CB_SANITIZER: ${{ matrix.sanitizer }}
          CB_CLANG: /usr/bin/clang-${{ env.LLVM_VERSION }}
          CB_CLANGXX: /usr/bin/clang++-${{ env.LLVM_VERSION }}
          # SA: see CXXCBC-571, Valgrind reports memory leak, because ASIO does
          # not deallocate thread-local state of OpenSSL properly
          CB_BORINGSSL: OFF
          CB_NUMBER_OF_JOBS: 8
        run: ./bin/build-tests
      - name: Upload build artifacts
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.sanitizer }}
          path: ./cmake-build-tests-${{ matrix.sanitizer }}
  unit:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        sanitizer:
          - asan
          - lsan
          - tsan
          - ubsan
          - valgrind
    runs-on: ubuntu-24.04
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y libssl-dev cmake curl wget gnupg2 libcurl4-openssl-dev libprotobuf-dev libgrpc-dev libgrpc++-dev protobuf-compiler-grpc gdb valgrind
          wget -O - https://apt.llvm.org/llvm-snapshot.gpg.key | sudo gpg --dearmor --output /etc/apt/keyrings/llvm-snapshot.gpg
          sudo bash -c "echo 'deb [signed-by=/etc/apt/keyrings/llvm-snapshot.gpg] https://apt.llvm.org/noble/ llvm-toolchain-noble-${LLVM_VERSION} main' >> /etc/apt/sources.list"
          sudo apt-get update -y
          sudo apt-get install -y clang-${LLVM_VERSION} clang-tools-${LLVM_VERSION} libc++-${LLVM_VERSION}-dev libc++abi-${LLVM_VERSION}-dev libclang-rt-${LLVM_VERSION}-dev
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-${{ matrix.sanitizer }}
          path: ./cmake-build-tests-${{ matrix.sanitizer }}
      - name: Run unit tests (${{ matrix.sanitizer }})
        timeout-minutes: 60
        env:
          CB_SANITIZER: ${{ matrix.sanitizer }}
          TEST_LOG_LEVEL: trace
        run: |
          chmod -R +x ./cmake-build-tests-${{ matrix.sanitizer }}
          ./bin/run-unit-tests
      - name: Upload report
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: report-unit-${{ matrix.sanitizer }}
          path: |
            cmake-build-tests-${{ matrix.sanitizer }}/Testing/Temporary/*.log
  integration:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        sanitizer:
          - asan
          - lsan
          - tsan
          - ubsan
        server:
          - 8.0.0
        tls:
          - plain
          - tls
        # valgrind runs under memcheck and is far slower than the other
        # sanitizers (~110-130 min for the full suite), leaving no headroom
        # under the 120 min step budget. Shard it across two jobs (~1h each)
        # via ctest -I stride; the other sanitizers are fast and run unsharded.
        include:
          - { sanitizer: valgrind, server: 8.0.0, tls: plain, shard_index: 1, shard_total: 2 }
          - { sanitizer: valgrind, server: 8.0.0, tls: plain, shard_index: 2, shard_total: 2 }
          - { sanitizer: valgrind, server: 8.0.0, tls: tls, shard_index: 1, shard_total: 2 }
          - { sanitizer: valgrind, server: 8.0.0, tls: tls, shard_index: 2, shard_total: 2 }
    runs-on: ubuntu-24.04
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y libssl-dev cmake curl wget gnupg2 libcurl4-openssl-dev libprotobuf-dev libgrpc-dev libgrpc++-dev protobuf-compiler-grpc gdb valgrind
          wget -O - https://apt.llvm.org/llvm-snapshot.gpg.key | sudo gpg --dearmor --output /etc/apt/keyrings/llvm-snapshot.gpg
          sudo bash -c "echo 'deb [signed-by=/etc/apt/keyrings/llvm-snapshot.gpg] https://apt.llvm.org/noble/ llvm-toolchain-noble-${LLVM_VERSION} main' >> /etc/apt/sources.list"
          sudo apt-get update -y
          sudo apt-get install -y clang-${LLVM_VERSION} clang-tools-${LLVM_VERSION} libc++-${LLVM_VERSION}-dev libc++abi-${LLVM_VERSION}-dev libclang-rt-${LLVM_VERSION}-dev
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-${{ matrix.sanitizer }}
          path: ./cmake-build-tests-${{ matrix.sanitizer }}
      - name: Create Couchbase cluster with cbdinocluster
        id: cbdino
        uses: ./.github/actions/create-cluster
        with:
          version: ${{ matrix.server }}
          suite: integration
      - name: Check couchbase
        env:
          HOST: ${{ steps.cbdino.outputs.ip }}
        run: ./bin/check-cluster
      - name: Run integration tests (${{ matrix.sanitizer }}, ${{ matrix.tls }})
        timeout-minutes: 120
        env:
          CB_SANITIZER: ${{ matrix.sanitizer }}
          TEST_SERVER_VERSION: ${{ matrix.server }}
          TEST_CONNECTION_STRING: ${{ matrix.tls == 'tls' && format('{0}?trust_certificate=cluster.crt', steps.cbdino.outputs.tls-connstr) || steps.cbdino.outputs.connstr }}
          TEST_LOG_LEVEL: trace
          CB_TEST_SHARD_INDEX: ${{ matrix.shard_index }}
          CB_TEST_SHARD_TOTAL: ${{ matrix.shard_total }}
        run: |
          chmod -R +x ./cmake-build-tests-${{ matrix.sanitizer }}
          ./bin/run-integration-tests
      - name: Remove Couchbase cluster
        uses: ./.github/actions/remove-cluster
        with:
          id: ${{ steps.cbdino.outputs.id }}
      - name: Upload report
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: report-integration-${{ matrix.sanitizer }}-${{ matrix.tls }}-${{ matrix.server }}${{ matrix.shard_index && format('-shard{0}', matrix.shard_index) || '' }}
          path: |
            cmake-build-tests-${{ matrix.sanitizer }}/Testing/Temporary/*.log

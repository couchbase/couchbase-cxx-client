name: Build FIT performer image

run-name: ${{ inputs.ref || github.ref_name }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
      - release-*
    tags:
      - '*'
    # Only rebuild the (expensive) image when something that affects the
    # performer binary changes.
    paths:
      - 'tools/fit_performer/**'
      - 'core/**'
      - 'couchbase/**'
      - 'cmake/**'
      - 'CMakeLists.txt'
      - '.github/workflows/fit-performer-image.yml'

  workflow_dispatch:
    inputs:
      ref:
        type: string
        description: "Performer version. Specify a branch, tag, full commit hash, GitHub PR like 'refs/pull/37/merge', or Gerrit PR like 'refs/changes/58/240858/6'"
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: couchbaselabs/sdk-docker-build-action@v1
        with:
          sdk: cxx
          ref: ${{ inputs.ref }}
          dockerfile: tools/fit_performer/Dockerfile

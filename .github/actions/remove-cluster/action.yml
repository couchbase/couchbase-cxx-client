name: remove-cluster
description: Removes a cbdinocluster cluster
inputs:
  id:
    description: 'cbdinocluster ID'
    required: true
runs:
  using: composite
  steps:
    - name: Remove cbdinocluster cluster
      shell: bash
      env:
        # Map input.id to an environment variable to prevent shell injection
        CLUSTER_ID: ${{ inputs.id }}
      run: |
        cbdinocluster -v rm "$CLUSTER_ID"
